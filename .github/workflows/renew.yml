name: DigitalPlat Domain Renew

on:
  schedule:
    # 每 3 天运行一次 (UTC时间 20:00，对应北京时间凌晨 4:00)
    - cron: '0 20 */3 * *'
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        playwright install firefox
        sudo apt-get update
        sudo apt-get install -y \
          libasound2t64 \
          libatk-bridge2.0-0t64 \
          libatk1.0-0t64 \
          libatspi2.0-0t64 \
          libcairo2 \
          libcups2t64 \
          libdbus-1-3 \
          libdbus-glib-1-2 \
          libdrm2 \
          libgbm1 \
          libglib2.0-0t64 \
          libnspr4 \
          libnss3 \
          libpango-1.0-0 \
          libx11-6 \
          libxcb1 \
          libxcomposite1 \
          libxdamage1 \
          libxext6 \
          libxfixes3 \
          libxkbcommon0 \
          libxrandr2 \
          libcairo-gobject2 \
          libfontconfig1 \
          libfreetype6 \
          libgdk-pixbuf-2.0-0 \
          libgtk-3-0t64 \
          libpangocairo-1.0-0 \
          libx11-xcb1 \
          libxcb-shm0 \
          libxcursor1 \
          libxi6 \
          libxrender1 \
          xvfb \
          fonts-noto-color-emoji \
          fonts-unifont

    - name: Run renewal script
      env:
        DP_EMAIL: ${{ secrets.DP_EMAIL }}
        DP_PASSWORD: ${{ secrets.DP_PASSWORD }}
        BARK_KEY: ${{ secrets.BARK_KEY }}
        BARK_SERVER: ${{ secrets.BARK_SERVER }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      run: python renew.py
      
    - name: Upload screenshots on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: error-screenshots
        path: "*.png"
